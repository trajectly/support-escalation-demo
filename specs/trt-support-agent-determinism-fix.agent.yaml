schema_version: "0.4"
name: "trt-support-agent-determinism-fix"
command: "python -m agents.support_agent_determinism_fix"
workdir: ..
fixture_policy: by_hash
strict: true
budget_thresholds:
  max_tool_calls: 6
  max_tokens: 500
contracts:
  tools:
    allow: [fetch_ticket, check_entitlements, now_utc, escalate_to_human, send_resolution]
    deny: [unsafe_auto_close]
  sequence:
    require:
      [tool:fetch_ticket, tool:check_entitlements, tool:now_utc, tool:escalate_to_human]
    require_before:
      - before: tool:check_entitlements
        after: tool:escalate_to_human
