schema_version: "0.3"
name: "trt-support-agent"
command: "python -m agents.support_agent"
workdir: ..
fixture_policy: by_hash
strict: true
budget_thresholds:
  max_tool_calls: 5
  max_tokens: 400
contracts:
  tools:
    allow: [fetch_ticket, check_entitlements, escalate_to_human, send_resolution]
    deny: [unsafe_auto_close]
  sequence:
    require: [tool:fetch_ticket, tool:check_entitlements, tool:escalate_to_human]
    require_before:
      - before: tool:check_entitlements
        after: tool:escalate_to_human
