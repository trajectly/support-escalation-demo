name: Trajectly Agent Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trajectly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify demo scenarios
        id: verify_demo
        continue-on-error: true
        run: bash scripts/verify_demo.sh

      - name: Run Trajectly action
        id: trt_action
        continue-on-error: true
        uses: trajectly/trajectly-action@v1.0.1
        with:
          spec_glob: "specs/trt-support-agent-baseline.agent.yaml"
          project_root: "."
          comment_pr: "true"
          upload_artifacts: "true"

      - name: Enforce Trajectly verdict
        if: always()
        run: |
          if [ "${{ steps.verify_demo.outcome }}" != "success" ]; then
            echo "Trajectly detected a regression during verify demo scenarios (step outcome: ${{ steps.verify_demo.outcome }})."
            exit 1
          fi
          if [ "${{ steps.trt_action.outcome }}" != "success" ]; then
            echo "Trajectly detected a regression in baseline replay (step outcome: ${{ steps.trt_action.outcome }})."
            exit 1
          fi
          echo "Trajectly: all checks passed."
