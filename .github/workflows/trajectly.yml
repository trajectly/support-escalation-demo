name: Trajectly Agent Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trajectly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Trajectly workspace
        uses: actions/cache@v4
        with:
          path: .trajectly
          key: trajectly-${{ runner.os }}-${{ hashFiles('specs/**', 'agents/**') }}
          restore-keys: |
            trajectly-${{ runner.os }}-

      - name: Install Trajectly
        run: |
          python -m pip install --upgrade pip
          python -m pip install trajectly

      - name: Run Trajectly spec
        id: trt_run
        run: |
          set +e
          python -m trajectly run specs/trt-support-agent-baseline.agent.yaml --project-root .
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          set -e
          exit 0

      - name: Generate PR comment markdown
        if: always()
        run: python -m trajectly report --pr-comment > trajectly_pr_comment.md

      - name: Upload Trajectly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trajectly-artifacts
          path: .trajectly/**

      - name: Post or update PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- trajectly-report -->";
            const body = fs.readFileSync("trajectly_pr_comment.md", "utf8");
            const fullBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: fullBody,
              });
            }

      - name: Enforce Trajectly verdict
        if: always()
        run: |
          code="${{ steps.trt_run.outputs.exit_code }}"
          echo "Trajectly exit code: $code"
          exit "$code"
