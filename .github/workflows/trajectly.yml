name: Trajectly Agent Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trajectly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify demo scenarios
        id: verify_demo
        continue-on-error: true
        run: bash scripts/verify_demo.sh

      - name: Run Trajectly spec
        id: trt_run
        continue-on-error: true
        run: |
          python -m trajectly init
          python -m trajectly run specs/trt-support-agent-baseline.agent.yaml --project-root .

      - name: Generate PR comment markdown
        if: always()
        continue-on-error: true
        run: |
          if python -m trajectly report --pr-comment > trajectly_pr_comment.md; then
            echo "Generated Trajectly PR comment markdown."
          else
            printf '%s\n\n%s\n%s\n' \
              '## Trajectly Report Unavailable' \
              'Trajectly could not generate `latest.json` for this run.' \
              'See failed check steps above for the primary regression/error signal.' \
              > trajectly_pr_comment.md
          fi

      - name: Upload Trajectly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trajectly-artifacts
          path: .trajectly/**
          include-hidden-files: true

      - name: Post or update PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- trajectly-report -->";
            const body = fs.readFileSync("trajectly_pr_comment.md", "utf8");
            const fullBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: fullBody,
              });
            }

      - name: Enforce Trajectly verdict
        if: always()
        run: |
          if [ "${{ steps.verify_demo.outcome }}" != "success" ]; then
            echo "Trajectly detected a regression during verify demo scenarios (step outcome: ${{ steps.verify_demo.outcome }})."
            exit 1
          fi
          if [ "${{ steps.trt_run.outcome }}" != "success" ]; then
            echo "Trajectly detected a regression in baseline replay (step outcome: ${{ steps.trt_run.outcome }})."
            exit 1
          fi
          echo "Trajectly: all checks passed."
